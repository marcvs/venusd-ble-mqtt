# venusd-ble-mqtt example configuration
#
# Copy to one of the auto-discovered paths (loaded when no -c is given):
#   ./venusd-ble-mqtt.ini
#   ~/.config/venusd-ble-mqtt.ini
#   /etc/venusd-ble-mqtt.ini
# ...or point at it explicitly:  venusd-ble-mqtt -c /etc/venusd-ble-mqtt.ini
#
# Any value here can be overridden on the command line.

[ble]
# Pin the device by BLE address (recommended once known) for fast, reliable
# connects. Find it with: bluetoothctl scan on  (look for MST_ACCP / MST-TPM)
# address = AA:BB:CC:DD:EE:FF

# If address is empty, scan for a device whose advertised name starts with
# this prefix. MST_ACCP = Venus battery, MST-TPM = CT002 meter.
name_prefix = MST_ACCP

# GATT characteristics. Defaults are ff02 for both notify and write (the Venus
# E both accepts commands on and replies on ff02). Only change if your unit
# differs (discover with scripts/probe.py, or: bluetoothctl -> menu gatt).
# notify_uuid = 0000ff02-0000-1000-8000-00805f9b34fb
# write_uuid  = 0000ff02-0000-1000-8000-00805f9b34fb

connect_timeout = 20
response_timeout = 10

# Reconnect behaviour. Each connect attempt does a fresh scan first (BlueZ
# cache warm), retrying this many times before falling back to the outer
# backoff loop. A dropped link is detected immediately and reconnects.
connect_retries = 3
retry_delay = 3

[poll]
# Seconds between poll cycles.
interval = 120

# Which read-only commands to poll each cycle (comma-separated).
# Known: runtime, device_info, wifi, system, errors, bms, events, network
# Good routine subset: runtime + bms + system. Add errors/events occasionally
# for diagnostics (they're larger responses).
# bms also publishes derived power_w (signed: + charging, - discharging) and
# stored_energy_wh, handy for energy dashboards.
# NOTE: keep 'system' in the list for abnormal-data detection (below) to work.
commands = runtime, bms, system

# A second BLE client (e.g. the rweijnen browser monitor) sharing the notify
# characteristic corrupts our frames -> garbage readings (system_normal=false).
# Such data is never published. If it persists this many seconds, force a full
# BLE disconnect/reconnect (BlueZ Device1.Disconnect, same effect as
# `bluetoothctl disconnect`) to reset the device. Set to 0 to only suppress the
# bad data without the forced reconnect. Raise it if you want a longer window to
# debug in the browser before the daemon kicks the link.
abnormal_timeout = 300

[mqtt]
host = localhost
port = 1883
# username =
# password =
client_id = venusd-ble-mqtt
topic_prefix = venusd
qos = 0
retain = false
# Include raw response hex in payloads (useful while mapping Venus D fields).
publish_raw = false

[log]
level = INFO
